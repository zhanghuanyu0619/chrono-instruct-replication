# One vintage, one run. Change `model_repo` (and output_dir) to sweep vintages.
# Stage `sources` are matched as case-insensitive substrings against the dataset's
# `source` column — run `chrono inspect` first to see the exact values and counts.
#
# Temporal screen (paper s2.2.1): keep only pairs the GPT-4.1 classifier labels
# 0 ("pre-2000") with confidence 10. This is a SINGLE conservative screen, not
# per-vintage: pre-2000 data is pre-tau for every vintage tau >= 1999, so the
# filtered+packed corpus is built once (cache_dir) and reused across all vintages.
# The screen drops the release from 647,944 rows to the paper's ~425,119.
model_repo: manelalab/chrono-gpt-v1-20201231
dataset: manelalab/ChronoInstruct-SFT
output_dir: runs/chrono-instruct-2020
cache_dir: cache            # packed blocks cached here; shared across vintage runs
min_confidence: 10          # confidence gate for label-0 retention (set null to skip)

block_size: 1792
seed: 123

batch_size: 8
grad_accum: 4
warmup_ratio: 0.03
weight_decay: 0.0
val_fraction: 0.05
log_every: 20
save_every: 500

# Optional integrations — both OFF by default. Loss curves always go to
# output_dir/metrics.csv (the source for Figures 1-2) regardless of W&B.
wandb:
  enabled: false
  project: chrono-instruct
  name: null                # defaults to the output_dir basename
push_to_hub:
  enabled: false            # push output_dir/final to the Hub when training ends
  repo_id: zhanghuanyu0619/chrono-instruct-v1-20201231
  private: true             # needs a write token (hf auth login / HF_TOKEN)

# Curriculum, trained in order; each stage continues from the previous weights.
# LR / epochs are an initial guess to be tuned against the paper's Figure 1 curves.
stages:
  - name: stage1_scratch
    sources: ["scratch"]
    epochs: 3
    lr: 3.0e-5
  - name: stage2_self_instruct
    sources: ["self-instruct", "self-generated", "gpt-3"]
    epochs: 1
    lr: 3.0e-5
  - name: stage3_tulu
    sources: ["tulu"]
    epochs: 1
    lr: 2.0e-5
